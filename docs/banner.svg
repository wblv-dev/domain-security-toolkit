<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="50%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)" rx="16"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#60a5fa" stroke-width="1">
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="800" y1="0" x2="800" y2="300"/>
    <line x1="1000" y1="0" x2="1000" y2="300"/>
  </g>

  <!-- Decorative accent circle -->
  <circle cx="1100" cy="60" r="120" fill="url(#accent)" opacity="0.06"/>
  <circle cx="100" cy="260" r="80" fill="#059669" opacity="0.04"/>

  <!-- Shield icon -->
  <g transform="translate(80, 90)" filter="url(#glow)">
    <path d="M60 8 L110 28 L110 72 C110 108 88 138 60 148 C32 138 10 108 10 72 L10 28 Z"
          fill="none" stroke="url(#shield)" stroke-width="3" opacity="0.9"/>
    <!-- Checkmark inside shield -->
    <path d="M40 78 L54 92 L82 58"
          fill="none" stroke="#34d399" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Title -->
  <text x="210" y="128" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="48" font-weight="700" fill="#e2e8f0" letter-spacing="-1">
    Domain Security Toolkit
  </text>

  <!-- Tagline -->
  <text x="210" y="168" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="20" fill="#94a3b8" font-weight="400">
    Open-source domain security auditing aligned with industry guidance
  </text>

  <!-- Accent line -->
  <rect x="210" y="185" width="120" height="3" rx="2" fill="url(#accent)"/>

  <!-- Feature pills -->
  <g transform="translate(210, 210)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500">
    <!-- Pill 1 -->
    <rect x="0" y="0" width="110" height="30" rx="15" fill="#059669" opacity="0.15"/>
    <text x="55" y="20" fill="#34d399" text-anchor="middle">35+ Checks</text>
    <!-- Pill 2 -->
    <rect x="122" y="0" width="120" height="30" rx="15" fill="#3b82f6" opacity="0.15"/>
    <text x="182" y="20" fill="#60a5fa" text-anchor="middle">OSINT Powered</text>
    <!-- Pill 3 -->
    <rect x="254" y="0" width="130" height="30" rx="15" fill="#d97706" opacity="0.15"/>
    <text x="319" y="20" fill="#fbbf24" text-anchor="middle">NIST · OWASP</text>
    <!-- Pill 4 -->
    <rect x="396" y="0" width="105" height="30" rx="15" fill="#8b5cf6" opacity="0.15"/>
    <text x="448" y="20" fill="#a78bfa" text-anchor="middle">MIT License</text>
    <!-- Pill 5 -->
    <rect x="513" y="0" width="140" height="30" rx="15" fill="#059669" opacity="0.15"/>
    <text x="583" y="20" fill="#34d399" text-anchor="middle">No Keys Needed</text>
  </g>
</svg>
