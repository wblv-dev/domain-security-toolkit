<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security Audit Report</title>
<script>/*CHARTJS_PLACEHOLDER*/</script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:#0a0e1a;color:#e2e8f0;line-height:1.5}
a{color:#60a5fa;text-decoration:none}
a:hover{text-decoration:underline}

/* Layout — min-width prevents page width jumping between tabs */
.page{max-width:1400px;margin:0 auto;padding:20px;min-height:100vh}
.panel{min-height:400px}
.grid{display:grid;gap:16px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:1fr 1fr 1fr}
.g4{grid-template-columns:1fr 1fr 1fr 1fr}
@media(max-width:900px){.g2,.g3,.g4{grid-template-columns:1fr}}

/* Header */
.hdr{background:linear-gradient(135deg,#0f172a,#1e293b);border-radius:16px;
  padding:28px 36px;margin-bottom:20px;display:flex;justify-content:space-between;
  align-items:center;flex-wrap:wrap;gap:16px;position:relative;overflow:hidden}
.hdr::after{content:'';position:absolute;top:-40%;right:-5%;width:250px;height:250px;
  background:radial-gradient(circle,rgba(99,102,241,.12),transparent 70%);border-radius:50%}
.hdr h1{font-size:1.8em;font-weight:700}
.hdr .sub{color:#94a3b8;font-size:.9em}
.score-hero{text-align:center}
.score-hero .num{font-size:3.2em;font-weight:800;
  background:linear-gradient(135deg,#34d399,#3b82f6);-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text}
.score-hero .lbl{color:#94a3b8;font-size:.82em}

/* Tabs */
.tabs{display:flex;gap:2px;border-bottom:2px solid #1f2937;margin-bottom:24px;overflow-x:auto}
.tab{padding:10px 20px;background:transparent;border:none;color:#64748b;font-size:.88em;
  font-weight:600;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;
  transition:all .2s}
.tab:hover{color:#e2e8f0;background:rgba(255,255,255,.03)}
.tab.active{color:#60a5fa;border-bottom-color:#60a5fa}
.tab .count{background:#dc2626;color:#fff;font-size:.7em;padding:1px 6px;border-radius:8px;margin-left:4px}
.panel{display:none;animation:fadeIn .25s ease}
.panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* Cards */
.card{background:#111827;border:1px solid #1f2937;border-radius:12px;padding:20px;transition:border-color .2s}
.card:hover{border-color:#374151}
.card-title{font-size:.72em;text-transform:uppercase;letter-spacing:1px;color:#64748b;margin-bottom:6px}

/* KPI - clickable */
.kpi{text-align:center;padding:24px 16px;cursor:pointer;transition:transform .15s,box-shadow .15s}
.kpi:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.kpi .val{font-size:2.6em;font-weight:800;line-height:1}
.kpi .lbl{font-size:.78em;color:#94a3b8;margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
.kpi .hint{font-size:.7em;color:#475569;margin-top:2px}
.kpi.green .val{color:#34d399} .kpi.amber .val{color:#fbbf24}
.kpi.red .val{color:#f87171} .kpi.blue .val{color:#60a5fa}

/* Section titles */
.stitle{font-size:1em;font-weight:700;color:#60a5fa;text-transform:uppercase;
  letter-spacing:1.2px;margin:28px 0 14px;padding-bottom:6px;border-bottom:2px solid rgba(96,165,250,.15)}

/* Badges */
.badge{display:inline-block;padding:2px 9px;border-radius:10px;font-size:.73em;font-weight:600;white-space:nowrap}
.badge-success{background:rgba(52,211,153,.15);color:#34d399}
.badge-warning{background:rgba(251,191,36,.15);color:#fbbf24}
.badge-danger{background:rgba(248,113,113,.15);color:#f87171}
.badge-info{background:rgba(96,165,250,.15);color:#60a5fa}
.badge-critical{background:rgba(220,38,38,.2);color:#fca5a5}
.badge-high{background:rgba(249,115,22,.2);color:#fb923c}
.badge-medium{background:rgba(251,191,36,.15);color:#fbbf24}
.badge-low{background:rgba(96,165,250,.15);color:#60a5fa}

/* Progress bars */
.pbar-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.pbar-row .lbl{width:130px;font-size:.82em;color:#94a3b8;text-align:right;flex-shrink:0}
.pbar-track{flex:1;height:24px;background:#1f2937;border-radius:12px;overflow:hidden;display:flex}
.pbar-seg{height:100%;transition:width .5s ease}
.pbar-row .score{width:45px;font-size:.82em;color:#94a3b8;text-align:right}

/* Heatmap */
.hm{display:grid;gap:3px;font-size:.78em;text-align:center}
.hm .c{padding:10px 6px;border-radius:6px;font-weight:600;cursor:pointer;transition:opacity .15s}
.hm .c:hover{opacity:.8}
.hm .h{color:#475569;padding:8px;font-weight:600}
.hm .r{color:#94a3b8;padding:10px 10px;text-align:right;display:flex;align-items:center;justify-content:flex-end;font-weight:500}
.hg{background:rgba(52,211,153,.2);color:#34d399}
.ha{background:rgba(251,191,36,.2);color:#fbbf24}
.hr{background:rgba(248,113,113,.2);color:#f87171}
.hi{background:rgba(96,165,250,.12);color:#60a5fa}

/* Domain cards */
.dcard{background:#111827;border:1px solid #1f2937;border-radius:12px;margin-bottom:12px;overflow:hidden}
.dcard-hdr{padding:16px 20px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:background .15s}
.dcard-hdr:hover{background:#1a2332}
.dcard-hdr h3{font-size:.95em;font-weight:600;flex:1}
.dcard-badges{display:flex;gap:5px;flex-wrap:wrap}
.dcard-chart{width:70px;height:70px;flex-shrink:0}
.dcard-body{max-height:0;overflow:hidden;transition:max-height .35s ease}
.dcard.open .dcard-body{max-height:8000px}
.dcard-inner{padding:0 20px 20px}
.chev{transition:transform .3s;color:#475569;font-size:.75em}
.dcard.open .chev{transform:rotate(180deg)}

/* Findings */
.fcard{background:#111827;border-left:4px solid;border-radius:0 12px 12px 0;padding:18px 22px;margin-bottom:10px}
.fcard.p-critical{border-color:#dc2626} .fcard.p-high{border-color:#f97316}
.fcard.p-medium{border-color:#eab308} .fcard.p-low{border-color:#3b82f6}
.fcard-hdr{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.fcard-risk{color:#94a3b8;font-size:.88em;line-height:1.5;margin-bottom:8px}
.fcard ol{padding-left:24px;color:#cbd5e1;font-size:.88em}
.fcard ol li{padding:3px 0}

/* Tables */
table{width:100%;border-collapse:collapse}
th{background:#0f172a;color:#64748b;padding:9px 12px;text-align:left;font-size:.73em;
  font-weight:600;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #1f2937}
td{padding:9px 12px;border-bottom:1px solid #1f2937;font-size:.83em;color:#cbd5e1}
tr:hover td{background:rgba(255,255,255,.02)}
code{font-family:'SF Mono',Monaco,Consolas,monospace;background:#1e293b;padding:1px 5px;
  border-radius:4px;font-size:.8em;color:#93c5fd}

/* Collapsible detail */
.coll-btn{background:#1e293b;border:1px solid #374151;color:#94a3b8;padding:8px 16px;
  border-radius:8px;cursor:pointer;font-size:.83em;width:100%;text-align:left;margin-top:10px;transition:all .15s}
.coll-btn:hover{background:#374151;color:#e2e8f0}
.coll-body{max-height:0;overflow:hidden;transition:max-height .35s ease}
.coll-body.open{max-height:20000px}

/* Diff */
.diff-item{padding:8px 14px;border-radius:8px;margin-bottom:6px;font-size:.88em;display:flex;align-items:center;gap:8px}
.diff-regression{background:rgba(248,113,113,.1);border-left:3px solid #dc2626}
.diff-improvement{background:rgba(52,211,153,.1);border-left:3px solid #059669}
.diff-dns{background:rgba(96,165,250,.1);border-left:3px solid #3b82f6}

/* Priority group (collapsible) */
.pgroup{margin-bottom:16px;border-radius:12px;overflow:hidden;border:1px solid #1f2937}
.pgroup-hdr{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;transition:background .15s;background:#111827}
.pgroup-hdr:hover{background:#1a2332}
.pgroup-hdr h3{font-size:.9em;font-weight:600;display:flex;align-items:center;gap:8px}
.pgroup-body{max-height:0;overflow:hidden;transition:max-height .35s ease}
.pgroup.open .pgroup-body{max-height:50000px}
.pgroup .gchev{transition:transform .3s;color:#475569;font-size:.7em}
.pgroup.open .gchev{transform:rotate(180deg)}
.pgroup.critical .pgroup-hdr{border-left:4px solid #dc2626}
.pgroup.high .pgroup-hdr{border-left:4px solid #f97316}
.pgroup.medium .pgroup-hdr{border-left:4px solid #eab308}
.pgroup.low .pgroup-hdr{border-left:4px solid #3b82f6}
.pgroup.info .pgroup-hdr{border-left:4px solid #64748b}

/* Finding detail (expandable row) */
.finding-row{cursor:pointer;transition:background .15s}
.finding-row:hover td{background:rgba(96,165,250,.05)}
.finding-detail{display:none;animation:fadeIn .2s ease}
.finding-detail td{padding:16px 20px;background:#0f172a;border-left:3px solid #60a5fa}
.finding-detail .fd-inner{max-width:700px}
.finding-detail h4{color:#60a5fa;font-size:.9em;margin-bottom:8px}
.finding-detail .fd-explain{color:#94a3b8;font-size:.88em;line-height:1.6;margin-bottom:12px}
.finding-detail .fd-steps{list-style:none;counter-reset:fstep;margin:0;padding:0}
.finding-detail .fd-steps li{counter-increment:fstep;padding:5px 0 5px 28px;position:relative;
  font-size:.88em;color:#cbd5e1}
.finding-detail .fd-steps li::before{content:counter(fstep);position:absolute;left:0;width:20px;
  height:20px;background:#1e293b;border-radius:50%;text-align:center;line-height:20px;
  font-size:.72em;font-weight:700;color:#60a5fa}

/* Tooltip */
.tip{position:relative;border-bottom:1px dotted #4b5563;cursor:help}
.tip:hover::after{content:attr(data-tip);position:absolute;top:calc(100% + 6px);left:0;
  background:#1e293b;border:1px solid #374151;color:#cbd5e1;padding:8px 12px;border-radius:8px;
  font-size:.78em;max-width:280px;width:max-content;z-index:100;line-height:1.4;
  box-shadow:0 4px 12px rgba(0,0,0,.4);font-weight:400;white-space:normal}

/* Filter bar */
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-bar select,.filter-bar input{background:#111827;border:1px solid #374151;color:#e2e8f0;
  padding:8px 12px;border-radius:8px;font-size:.85em}
.filter-bar select:focus,.filter-bar input:focus{border-color:#60a5fa;outline:none}

/* Footer */
.footer{text-align:center;padding:36px;color:#475569;font-size:.78em;margin-top:36px;border-top:1px solid #1f2937}
.footer a{color:#60a5fa}

/* Print */
@media print{
  body{background:#fff;color:#1a1a2e;font-size:11px}
  .card,.dcard,.fcard{background:#f8fafc;border-color:#e2e8f0;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .hdr{background:#1e293b!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .dcard-body,.coll-body{max-height:none!important}
  th{background:#f1f5f9;color:#334155}
  td{color:#334155;border-color:#e2e8f0}
  .tabs,.filter-bar{display:none}
  .panel{display:block!important}
  .stitle{color:#1e40af;page-break-before:auto}
  .fcard,.dcard{page-break-inside:avoid}
  code{background:#f1f5f9;color:#1e40af}
  .page{max-width:100%;padding:10px}
}
</style>
</head>
<body>
<div class="page">

<!-- Header -->
<div class="hdr">
  <div>
    <h1>Security Audit Report</h1>
    <div class="sub" id="headerSub"></div>
  </div>
  <div class="score-hero">
    <div class="num" id="heroScore"></div>
    <div class="lbl">Compliant</div>
    <div class="lbl" id="heroExplain" style="font-size:.7em;max-width:200px;margin-top:4px;line-height:1.3"></div>
  </div>
</div>

<!-- Global search -->
<div style="margin-bottom:16px">
  <input id="globalSearch" type="text" placeholder="Search domains, checks, findings..."
    style="width:100%;padding:12px 16px;background:#111827;border:1px solid #374151;color:#e2e8f0;
    border-radius:10px;font-size:.9em;outline:none;transition:border-color .2s"
    onfocus="this.style.borderColor='#60a5fa'" onblur="this.style.borderColor='#374151'"
    oninput="globalFilter(this.value)">
</div>

<!-- Tabs -->
<div class="tabs" id="tabBar"></div>

<!-- Panels populated by JS -->
<div id="panels"></div>

<!-- Footer -->
<div class="footer">
  Generated by <a href="https://github.com/wblv-dev/domain-security-toolkit">domain-security-toolkit</a>
  &middot; Read-only &mdash; no changes made to any zone.
</div>

</div>

<script>
/* ── DATA (injected by Python) ───────────────────────────── */
var D = /*AUDIT_DATA*/null;

/* ── HELPERS ─────────────────────────────────────────────── */
var GC = {PASS:'badge-success',WARN:'badge-warning',FAIL:'badge-danger',INFO:'badge-info'};
var GP = {Critical:'p-critical',High:'p-high',Medium:'p-medium',Low:'p-low'};
var PB = {Critical:'badge-critical',High:'badge-high',Medium:'badge-medium',Low:'badge-low'};
function badge(g,txt){return '<span class="badge '+(GC[g]||'badge-info')+'">'+(txt||g)+'</span>'}
function esc(s){if(s==null)return'';var d=document.createElement('div');d.textContent=String(s);return d.innerHTML}
function tip(label,tooltip){if(!tooltip)return esc(label);return '<span class="tip" data-tip="'+esc(tooltip)+'">'+esc(label)+'</span>'}
function pct(n,t){return t?Math.round(n/t*100):0}
function fmtDate(s){
  if(!s)return'';
  try{var d=new Date(s);return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})+' '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}
  catch(e){return s}
}

/* ── TAB SYSTEM ──────────────────────────────────────────── */
var tabs = [
  {id:'summary', label:'Executive Summary'},
  {id:'findings', label:'Findings', count:0},
  {id:'domains', label:'Domains'},
  {id:'remediation', label:'Remediations', count:0},
  {id:'checks', label:'Checks Reference'},
  {id:'history', label:'Changes'}
];

function switchTab(id, filter){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('active',t.dataset.tab===id)});
  document.querySelectorAll('.panel').forEach(function(p){p.classList.toggle('active',p.id==='panel-'+id)});
  if(filter && id==='findings') applyFindingsFilter(filter);
}

/* ── BUILD EXECUTIVE SUMMARY ─────────────────────────────── */
function buildSummary(){
  // Compliance % excludes INFO (informational/not-applicable checks don't count against you)
  var actionable=D.grades.pass+D.grades.warn+D.grades.fail;
  var compPct=pct(D.grades.pass,actionable);

  document.getElementById('heroScore').textContent=compPct+'%';
  document.getElementById('heroExplain').textContent=D.grades.pass+' of '+actionable+' actionable checks passed ('+D.grades.info+' informational excluded)';
  document.getElementById('headerSub').textContent=D.generated+' \u00b7 '+D.domains.length+' domains \u00b7 '+D.totalRecords+' DNS records';

  var h='';
  // KPI cards - clickable
  h+='<div class="grid g4" style="margin-bottom:20px">';
  h+='<div class="card kpi blue" onclick="switchTab(\'domains\')"><div class="val">'+D.domains.length+'</div><div class="lbl">Domains</div><div class="hint">Click to explore</div></div>';
  h+='<div class="card kpi green" onclick="switchTab(\'findings\');openGradeGroup(\'PASS\')"><div class="val">'+D.grades.pass+'</div><div class="lbl">Passed</div><div class="hint">Click to view</div></div>';
  h+='<div class="card kpi amber" onclick="switchTab(\'findings\');openGradeGroup(\'WARN\')"><div class="val">'+D.grades.warn+'</div><div class="lbl">Warnings</div><div class="hint">Click to view</div></div>';
  h+='<div class="card kpi red" onclick="switchTab(\'findings\');openGradeGroup(\'FAIL\')"><div class="val">'+D.grades.fail+'</div><div class="lbl">Failures</div><div class="hint">Click to view</div></div>';
  h+='</div>';

  // Charts row
  h+='<div class="grid g2">';
  h+='<div class="card"><div class="card-title">Compliance Distribution</div><div style="position:relative;max-width:320px;margin:0 auto;height:320px"><canvas id="mainDonut"></canvas></div></div>';
  h+='<div class="card"><div class="card-title">Category Scores</div><div style="padding-top:16px" id="catBars"></div></div>';
  h+='</div>';

  // Risk heatmap
  h+='<div class="stitle">Risk Matrix</div>';
  h+='<div class="card" id="heatmapCard"></div>';

  // Top findings preview
  var topFindings = D.findings.filter(function(f){return f.grade==='FAIL'}).slice(0,5);
  if(topFindings.length){
    h+='<div class="stitle">Top Failures</div>';
    topFindings.forEach(function(f){
      h+='<div class="fcard p-critical" style="cursor:pointer" onclick="switchTab(\'remediation\')">';
      h+='<div class="fcard-hdr">'+badge(f.grade)+' <strong>'+esc(f.domain)+'</strong> &mdash; '+tip(f.check,D.tooltips[f.check]||'')+'</div>';
      h+='<div class="fcard-risk">'+esc(f.risk||f.actual)+'</div></div>';
    });
  }

  return h;
}

/* ── BUILD FINDINGS TAB — grouped by grade priority ─────── */
function buildFindings(){
  var h='';
  // Filter bar
  h+='<div class="filter-bar">';
  h+='<select id="filterCat" onchange="applyFindingsFilter()"><option value="">All categories</option>';
  var cats={};D.allChecks.forEach(function(c){cats[c.category]=1});
  Object.keys(cats).sort().forEach(function(c){h+='<option value="'+esc(c)+'">'+esc(c)+'</option>'});
  h+='</select>';
  h+='<select id="filterDomain" onchange="applyFindingsFilter()"><option value="">All domains</option>';
  D.domains.forEach(function(d){h+='<option value="'+esc(d)+'">'+esc(d)+'</option>'});
  h+='</select>';
  h+='</div>';

  // Group checks by grade
  var groups=[
    {grade:'FAIL',label:'Failures',cls:'critical',open:true},
    {grade:'WARN',label:'Warnings',cls:'high',open:true},
    {grade:'PASS',label:'Passed',cls:'low',open:false},
    {grade:'INFO',label:'Informational',cls:'info',open:false}
  ];
  var gIdx=0;
  groups.forEach(function(gr){
    var items=D.allChecks.filter(function(c){return c.grade===gr.grade});
    if(!items.length)return;
    h+='<div class="pgroup '+gr.cls+(gr.open?' open':'')+'" data-grade="'+gr.grade+'">';
    h+='<div class="pgroup-hdr" onclick="this.parentElement.classList.toggle(\'open\')">';
    h+='<h3>'+badge(gr.grade)+' '+gr.label+' ('+items.length+')</h3>';
    h+='<span class="gchev">&#9660;</span></div>';
    h+='<div class="pgroup-body"><div style="padding:0 4px 12px">';
    h+='<table><thead><tr><th>Domain</th><th>Category</th><th>Check</th><th>Recommended</th><th>Status</th></tr></thead><tbody>';
    items.forEach(function(c){
      var idx=gIdx++;
      var tt=D.tooltips[c.check]||'';
      var rem=null;
      if(c.grade==='FAIL'||c.grade==='WARN'){
        D.findings.forEach(function(f){if(f.domain===c.domain&&f.check===c.check)rem=f});
      }
      // Main row
      h+='<tr class="finding-row" data-grade="'+esc(c.grade)+'" data-cat="'+esc(c.category)+'" data-domain="'+esc(c.domain)+'" onclick="toggleFinding(\'fd'+idx+'\')">';
      h+='<td><code>'+esc(c.domain)+'</code></td>';
      h+='<td>'+esc(c.category)+'</td>';
      h+='<td>'+tip(c.check,tt)+'</td>';
      h+='<td><code>'+esc(c.recommended||'\u2014')+'</code></td>';
      h+='<td>'+esc(c.actual||'\u2014')+'</td></tr>';
      // Detail row
      h+='<tr class="finding-detail" id="fd'+idx+'" data-grade="'+esc(c.grade)+'" data-cat="'+esc(c.category)+'" data-domain="'+esc(c.domain)+'">';
      h+='<td colspan="5"><div class="fd-inner">';
      h+='<h4>'+esc(c.check)+' \u2014 '+esc(c.domain)+'</h4>';
      if(tt) h+='<div class="fd-explain"><strong>What is this?</strong> '+esc(tt)+'</div>';
      if(c.actual) h+='<div class="fd-explain"><strong>Current status:</strong> '+esc(c.actual)+'</div>';
      if(rem&&rem.risk) h+='<div class="fd-explain"><strong>Risk:</strong> '+esc(rem.risk)+'</div>';
      if(rem&&rem.steps&&rem.steps.length){
        h+='<div style="margin-bottom:4px;font-size:.85em;color:#60a5fa;font-weight:600">How to fix:</div>';
        h+='<ol class="fd-steps">';
        rem.steps.forEach(function(s){h+='<li>'+esc(s)+'</li>'});
        h+='</ol>';
      } else if(c.grade==='PASS'){
        h+='<div class="fd-explain" style="color:#34d399">\u2713 This check is passing. No action required.</div>';
      } else if(c.grade==='INFO'){
        h+='<div class="fd-explain">Informational \u2014 no action required. This setting may not be available on your current plan.</div>';
      }
      h+='</div></td></tr>';
    });
    h+='</tbody></table></div></div></div>';
  });
  return h;
}

function toggleFinding(id){
  var el=document.getElementById(id);
  if(!el)return;
  el.style.display=el.style.display==='table-row'?'none':'table-row';
}

function openGradeGroup(grade){
  // Collapse all, then open the target group
  document.querySelectorAll('.pgroup').forEach(function(g){g.classList.remove('open')});
  document.querySelectorAll('.pgroup[data-grade="'+grade+'"]').forEach(function(g){
    g.classList.add('open');
    g.scrollIntoView({behavior:'smooth',block:'start'});
  });
}

function applyFindingsFilter(){
  var cat=document.getElementById('filterCat').value;
  var dom=document.getElementById('filterDomain').value;
  document.querySelectorAll('.finding-row').forEach(function(row){
    var show=true;
    if(cat && row.dataset.cat!==cat) show=false;
    if(dom && row.dataset.domain!==dom) show=false;
    row.style.display=show?'':'none';
  });
  document.querySelectorAll('.finding-detail').forEach(function(d){d.style.display='none'});
}

/* ── BUILD DOMAINS TAB ───────────────────────────────────── */
function buildDomains(){
  var h='';
  D.domainData.forEach(function(dd,i){
    h+='<div class="dcard" id="dcard'+i+'">';
    h+='<div class="dcard-hdr" onclick="this.parentElement.classList.toggle(\'open\')">';
    h+='<canvas class="dcard-chart" id="dDonut'+i+'" width="70" height="70"></canvas>';
    h+='<h3>'+esc(dd.domain)+'</h3>';
    h+='<div class="dcard-badges">';
    dd.badges.forEach(function(b){h+=badge(b.grade,b.label+': '+b.grade)+' '});
    h+='</div>';
    h+='<span class="chev">&#9660;</span></div>';
    h+='<div class="dcard-body"><div class="dcard-inner">';

    // Detail table for this domain
    h+='<table><thead><tr><th>Category</th><th>Check</th><th>Recommended</th><th>Actual</th><th>Grade</th></tr></thead><tbody>';
    dd.checks.forEach(function(c){
      h+='<tr><td>'+esc(c.category)+'</td><td>'+tip(c.check,D.tooltips[c.check]||'')+'</td>';
      h+='<td><code>'+esc(c.recommended||'\u2014')+'</code></td>';
      h+='<td>'+esc(c.actual||'\u2014')+'</td>';
      h+='<td>'+badge(c.grade)+'</td></tr>';
    });
    h+='</tbody></table>';

    // DNS records
    if(dd.dnsRecords && dd.dnsRecords.length){
      h+='<div class="stitle" style="margin-top:16px">DNS Records ('+dd.dnsRecords.length+')</div>';
      h+='<table><thead><tr><th>Type</th><th>Name</th><th>Content</th><th>TTL</th></tr></thead><tbody>';
      dd.dnsRecords.forEach(function(r){
        h+='<tr><td><code>'+esc(r.type)+'</code></td><td><code>'+esc(r.name)+'</code></td>';
        h+='<td><code>'+esc(r.content)+'</code></td><td>'+r.ttl+'</td></tr>';
      });
      h+='</tbody></table>';
    }
    h+='</div></div></div>';
  });
  return h;
}

/* ── BUILD REMEDIATIONS TAB ──────────────────────────────── */
function buildRemediations(){
  if(!D.findings.length) return '<div style="text-align:center;padding:60px;color:#64748b">No findings requiring remediation.</div>';
  var h='';
  var priorities=['Critical','High','Medium','Low'];
  priorities.forEach(function(p){
    var items=D.findings.filter(function(f){return f.priority===p});
    if(!items.length)return;
    h+='<div class="stitle">'+p+' Priority <span class="badge '+(PB[p]||'badge-info')+'">'+items.length+'</span></div>';
    items.forEach(function(f){
      h+='<div class="fcard '+(GP[p]||'')+'">';
      h+='<div class="fcard-hdr">'+badge(f.grade)+' <span class="badge '+(PB[p]||'badge-info')+'">'+p+'</span> <strong>'+esc(f.domain)+'</strong> &mdash; '+tip(f.check,D.tooltips[f.check]||'')+'</div>';
      h+='<div class="fcard-risk"><strong>Risk:</strong> '+esc(f.risk)+'</div>';
      if(f.steps && f.steps.length){
        h+='<div style="margin-bottom:4px;font-size:.85em;color:#94a3b8;font-weight:600">Steps to fix:</div>';
        h+='<ol>';
        f.steps.forEach(function(s){h+='<li>'+esc(s)+'</li>'});
        h+='</ol>';
      }
      h+='</div>';
    });
  });
  return h;
}

/* ── BUILD HISTORY/DIFF TAB ──────────────────────────────── */
function buildHistory(){
  if(!D.diff) return '<div style="text-align:center;padding:60px;color:#64748b">No previous run to compare. Run the audit again to see changes.</div>';
  var d=D.diff, h='';
  h+='<div class="card" style="margin-bottom:16px;padding:16px 20px"><strong>Comparing:</strong> Run #'+d.previous_run_id+' ('+fmtDate(d.previous_run_date)+') &rarr; Run #'+d.current_run_id+' ('+fmtDate(d.current_run_date)+')</div>';

  var regs=d.changes.filter(function(c){return c.direction==='regression'});
  var imps=d.changes.filter(function(c){return c.direction==='improvement'});
  var dnsAdd=d.dns_changes.filter(function(c){return c.action==='added'});
  var dnsRem=d.dns_changes.filter(function(c){return c.action==='removed'});

  h+='<div class="grid g4" style="margin-bottom:20px">';
  h+='<div class="card kpi red"><div class="val">'+regs.length+'</div><div class="lbl">Regressions</div></div>';
  h+='<div class="card kpi green"><div class="val">'+imps.length+'</div><div class="lbl">Improvements</div></div>';
  h+='<div class="card kpi blue"><div class="val">'+dnsAdd.length+'</div><div class="lbl">DNS Added</div></div>';
  h+='<div class="card kpi amber"><div class="val">'+dnsRem.length+'</div><div class="lbl">DNS Removed</div></div>';
  h+='</div>';

  if(regs.length){
    h+='<div class="stitle">Regressions</div>';
    regs.forEach(function(c){
      h+='<div class="diff-item diff-regression"><strong>'+esc(c.domain)+'</strong> '+esc(c.category)+'/'+esc(c.check)+': '+badge(c.old_grade)+' &rarr; '+badge(c.new_grade)+'</div>';
    });
  }
  if(imps.length){
    h+='<div class="stitle">Improvements</div>';
    imps.forEach(function(c){
      h+='<div class="diff-item diff-improvement"><strong>'+esc(c.domain)+'</strong> '+esc(c.category)+'/'+esc(c.check)+': '+badge(c.old_grade)+' &rarr; '+badge(c.new_grade)+'</div>';
    });
  }
  if(dnsAdd.length||dnsRem.length){
    h+='<div class="stitle">DNS Changes</div>';
    dnsAdd.forEach(function(c){h+='<div class="diff-item diff-dns">+ <strong>'+esc(c.domain)+'</strong> '+esc(c.type)+' '+esc(c.name)+' &rarr; '+esc(c.content)+'</div>'});
    dnsRem.forEach(function(c){h+='<div class="diff-item diff-dns">&minus; <strong>'+esc(c.domain)+'</strong> '+esc(c.type)+' '+esc(c.name)+' &rarr; '+esc(c.content)+'</div>'});
  }

  if(!regs.length && !imps.length && !dnsAdd.length && !dnsRem.length){
    h+='<div style="text-align:center;padding:40px;color:#64748b">No changes since previous run.</div>';
  }
  return h;
}

/* ── BUILD CATEGORY BARS ─────────────────────────────────── */
function buildCatBars(){
  var el=document.getElementById('catBars');if(!el)return;
  var h='';
  D.categories.forEach(function(cat){
    var t=cat.pass+cat.warn+cat.fail;if(!t)t=1;
    h+='<div class="pbar-row"><div class="lbl">'+esc(cat.name)+'</div><div class="pbar-track">';
    h+='<div class="pbar-seg" style="width:'+pct(cat.pass,t)+'%;background:#059669"></div>';
    h+='<div class="pbar-seg" style="width:'+pct(cat.warn,t)+'%;background:#d97706"></div>';
    h+='<div class="pbar-seg" style="width:'+pct(cat.fail,t)+'%;background:#dc2626"></div>';
    h+='</div><div class="score">'+pct(cat.pass,t)+'%</div></div>';
  });
  el.innerHTML=h;
}

/* ── BUILD HEATMAP ───────────────────────────────────────── */
function buildHeatmap(){
  var el=document.getElementById('heatmapCard');if(!el)return;
  var cats=D.categories.map(function(c){return c.name});
  var cols=1+cats.length;
  var h='<div class="hm" style="grid-template-columns:auto repeat('+cats.length+',1fr)">';
  h+='<div class="h"></div>';
  cats.forEach(function(c){h+='<div class="h">'+esc(c)+'</div>'});
  D.domainData.forEach(function(dd){
    h+='<div class="r">'+esc(dd.domain)+'</div>';
    cats.forEach(function(cat){
      var worst='PASS';
      dd.checks.forEach(function(c){
        if(c.category===cat){
          var order={FAIL:0,WARN:1,INFO:2,PASS:3};
          if((order[c.grade]||3)<(order[worst]||3)) worst=c.grade;
        }
      });
      var cls={PASS:'hg',WARN:'ha',FAIL:'hr',INFO:'hi'}[worst]||'hi';
      h+='<div class="c '+cls+'" onclick="switchTab(\'domains\')" title="'+esc(dd.domain)+' / '+esc(cat)+': '+worst+'">'+worst+'</div>';
    });
  });
  h+='</div>';
  el.innerHTML=h;
}

/* ── CHARTS ──────────────────────────────────────────────── */
function renderCharts(){
  if(typeof Chart==='undefined')return;
  // Main donut
  var ctx=document.getElementById('mainDonut');
  if(ctx){
    new Chart(ctx,{type:'doughnut',
      data:{labels:['Passed','Warnings','Failures','Info'],
        datasets:[{data:[D.grades.pass,D.grades.warn,D.grades.fail,D.grades.info],
          backgroundColor:['#059669','#d97706','#dc2626','#3b82f6'],borderWidth:0}]},
      options:{responsive:true,maintainAspectRatio:true,cutout:'65%',
        plugins:{legend:{position:'bottom',labels:{color:'#94a3b8',padding:14,font:{size:11},usePointStyle:true,pointStyle:'circle'}},
          tooltip:{backgroundColor:'#1e293b',titleColor:'#e2e8f0',bodyColor:'#e2e8f0',borderColor:'#334155',borderWidth:1,cornerRadius:8}}}
    });
  }
  // Domain mini donuts
  D.domainData.forEach(function(dd,i){
    var c=document.getElementById('dDonut'+i);
    if(!c)return;
    new Chart(c,{type:'doughnut',
      data:{labels:['Pass','Warn','Fail'],datasets:[{data:[dd.pass,dd.warn,dd.fail],backgroundColor:['#059669','#d97706','#dc2626'],borderWidth:0}]},
      options:{responsive:false,plugins:{legend:{display:false},tooltip:{enabled:true}},cutout:'65%'}
    });
  });
}

/* ── BUILD CHECKS REFERENCE TAB ───────────────────────────── */
function buildChecksRef(){
  var h='<div style="margin-bottom:16px;color:#94a3b8;font-size:.9em">Checks are graded against published recommendations from NIST, OWASP, NCSC, CISA, BSI, ENISA, and relevant RFCs. This is not a certification \u2014 it is an assessment of how your configuration aligns with these recommendations. Click any check for details.</div>';

  var stds=D.standards||{};
  var cats={};
  D.allChecks.forEach(function(c){
    if(!cats[c.category])cats[c.category]={};
    cats[c.category][c.check]=1;
  });

  Object.keys(cats).sort().forEach(function(cat){
    h+='<div class="stitle">'+esc(cat)+'</div>';
    var checks=Object.keys(cats[cat]).sort();
    checks.forEach(function(check){
      var tt=D.tooltips[check]||'';
      var refs=(stds[check]||{}).references||[];
      h+='<div class="card" style="margin-bottom:10px;cursor:pointer" onclick="this.querySelector(\'.check-detail\').classList.toggle(\'open\')">';
      h+='<div style="display:flex;justify-content:space-between;align-items:center">';
      h+='<strong>'+esc(check)+'</strong>';
      if(refs.length)h+='<span style="font-size:.75em;color:#64748b">'+refs.length+' standard(s)</span>';
      h+='</div>';
      h+='<div class="check-detail coll-body" style="margin-top:10px">';
      if(tt)h+='<div style="color:#94a3b8;font-size:.88em;margin-bottom:10px">'+esc(tt)+'</div>';
      if(refs.length){
        h+='<table><thead><tr><th>Body</th><th>Document</th><th>Requirement</th><th>Jurisdiction</th><th>Status</th></tr></thead><tbody>';
        refs.forEach(function(r){
          var link=r.url?'<a href="'+esc(r.url)+'" target="_blank" rel="noopener">'+esc(r.document)+'</a>':esc(r.document);
          h+='<tr><td><strong>'+esc(r.body)+'</strong></td><td>'+link+'</td>';
          h+='<td style="font-size:.85em">'+esc(r.requirement||'')+'</td>';
          h+='<td>'+esc(r.jurisdiction||'')+'</td>';
          h+='<td>'+(r.mandatory?badge('FAIL','Mandatory'):badge('INFO','Recommended'))+'</td></tr>';
        });
        h+='</tbody></table>';
      } else {
        h+='<div style="color:#475569;font-size:.85em">Industry best practice. No specific regulatory mandate found.</div>';
      }
      h+='</div></div>';
    });
  });
  return h;
}

/* ── GLOBAL SEARCH ───────────────────────────────────────── */
function globalFilter(q){
  q=q.toLowerCase().trim();
  // Filter domain cards
  document.querySelectorAll('.dcard').forEach(function(card){
    var text=(card.textContent||'').toLowerCase();
    card.style.display=(!q||text.indexOf(q)>=0)?'':'none';
  });
  // Filter finding rows
  document.querySelectorAll('.finding-row').forEach(function(row){
    var text=(row.textContent||'').toLowerCase();
    row.style.display=(!q||text.indexOf(q)>=0)?'':'none';
  });
  // Filter remediation cards
  document.querySelectorAll('.fcard').forEach(function(card){
    var text=(card.textContent||'').toLowerCase();
    card.style.display=(!q||text.indexOf(q)>=0)?'':'none';
  });
  // Filter heatmap rows
  document.querySelectorAll('.hm .r').forEach(function(r){
    var text=(r.textContent||'').toLowerCase();
    var show=(!q||text.indexOf(q)>=0);
    r.style.display=show?'':'none';
    // Also hide corresponding cells in the same grid row
    var idx=Array.from(r.parentNode.children).indexOf(r);
    // heatmap cells follow each row label
  });
  // Hide detail rows when searching
  document.querySelectorAll('.finding-detail').forEach(function(d){d.style.display='none'});
}

/* ── INIT ────────────────────────────────────────────────── */
(function(){
  if(!D){document.querySelector('.page').innerHTML='<p style="padding:40px;color:#f87171">Error: No audit data found.</p>';return}

  // Update tab counts with meaningful numbers
  var failCount=D.allChecks.filter(function(c){return c.grade==='FAIL'}).length;
  var warnCount=D.allChecks.filter(function(c){return c.grade==='WARN'}).length;
  tabs[1].count=failCount+warnCount;  // Findings = things needing attention
  tabs[3].count=D.findings.length;     // Remediations = those with fix steps

  // Build tab bar
  var tb=document.getElementById('tabBar'),th='';
  tabs.forEach(function(t){
    th+='<button class="tab" data-tab="'+t.id+'" onclick="switchTab(\''+t.id+'\')">'+t.label;
    if(t.count) th+='<span class="count">'+t.count+'</span>';
    th+='</button>';
  });
  tb.innerHTML=th;

  // Build panels
  var ph='';
  ph+='<div class="panel" id="panel-summary">'+buildSummary()+'</div>';
  ph+='<div class="panel" id="panel-findings">'+buildFindings()+'</div>';
  ph+='<div class="panel" id="panel-domains">'+buildDomains()+'</div>';
  ph+='<div class="panel" id="panel-remediation">'+buildRemediations()+'</div>';
  ph+='<div class="panel" id="panel-checks">'+buildChecksRef()+'</div>';
  ph+='<div class="panel" id="panel-history">'+buildHistory()+'</div>';
  document.getElementById('panels').innerHTML=ph;

  // Activate first tab
  switchTab('summary');

  // Render charts and dynamic elements
  buildCatBars();
  buildHeatmap();
  // Delay chart render to ensure canvases are visible in the DOM
  requestAnimationFrame(function(){setTimeout(renderCharts,100)});
})();
</script>
</body>
</html>
